<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cellen — Gest&#227;o Escolar Inteligente</title>
  <meta name="description" content="Cellen: plataforma de gest&#227;o para creches, jardins de inf&#226;ncia e ber&#231;&#225;rios em Angola. Matr&#237;culas, pagamentos, comunica&#231;&#227;o com pais e muito mais.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #2563EB;
      --primary-dark: #1D4ED8;
      --primary-light: #DBEAFE;
      --accent: #F59E0B;
      --dark: #0F172A;
      --gray-900: #1E293B;
      --gray-700: #334155;
      --gray-500: #64748B;
      --gray-300: #CBD5E1;
      --gray-100: #F1F5F9;
      --white: #FFFFFF;
      --radius: 12px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--gray-700);
      line-height: 1.6;
      background: var(--white);
    }

    /* --- NAV --- */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--gray-100);
      transition: box-shadow 0.3s;
    }
    nav.scrolled { box-shadow: 0 2px 20px rgba(0,0,0,0.06); }
    .nav-inner {
      max-width: 1140px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 64px;
    }
    .logo {
      font-size: 22px; font-weight: 800; color: var(--primary);
      text-decoration: none; letter-spacing: -0.5px;
    }
    .logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 32px; list-style: none; }
    .nav-links a {
      text-decoration: none; color: var(--gray-700); font-size: 14px;
      font-weight: 500; transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--primary); }
    .nav-cta {
      background: var(--primary); color: var(--white) !important;
      padding: 8px 20px; border-radius: 8px; font-weight: 600 !important;
      transition: background 0.2s !important;
    }
    .nav-cta:hover { background: var(--primary-dark); }
    .menu-toggle { display: none; background: none; border: none; cursor: pointer; padding: 4px; }
    .menu-toggle svg { width: 28px; height: 28px; color: var(--gray-700); }

    /* --- HERO --- */
    .hero {
      padding: 140px 24px 80px;
      text-align: center;
      background: linear-gradient(180deg, var(--primary-light) 0%, var(--white) 100%);
    }
    .hero-badge {
      display: inline-block; background: var(--white);
      border: 1px solid var(--gray-300); border-radius: 20px;
      padding: 6px 16px; font-size: 13px; font-weight: 600;
      color: var(--primary); margin-bottom: 24px;
    }
    .hero h1 {
      font-size: clamp(32px, 5vw, 56px); font-weight: 800;
      color: var(--dark); line-height: 1.15; max-width: 720px;
      margin: 0 auto 20px; letter-spacing: -1px;
    }
    .hero h1 em {
      font-style: normal;
      background: linear-gradient(135deg, var(--primary), #7C3AED);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p.hero-subtitle {
      font-size: 18px; color: var(--gray-500); max-width: 540px;
      margin: 0 auto 36px; line-height: 1.7;
    }
    .hero-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 28px; border-radius: 10px; font-size: 15px;
      font-weight: 600; text-decoration: none; transition: all 0.2s;
      border: none; cursor: pointer;
    }
    .btn-primary { background: var(--primary); color: var(--white); }
    .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,99,235,0.3); }
    .btn-outline { background: var(--white); color: var(--gray-700); border: 1.5px solid var(--gray-300); }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
    .hero-stats {
      display: flex; justify-content: center; gap: 48px;
      margin-top: 56px; padding-top: 40px;
      border-top: 1px solid var(--gray-300);
    }
    .hero-stats .stat { text-align: center; }
    .hero-stats .stat-num { font-size: 28px; font-weight: 800; color: var(--dark); }
    .hero-stats .stat-label { font-size: 13px; color: var(--gray-500); margin-top: 4px; }

    /* --- SECTIONS --- */
    section { padding: 80px 24px; }
    .container { max-width: 1140px; margin: 0 auto; }
    .section-header { text-align: center; margin-bottom: 56px; }
    .section-header h2 {
      font-size: clamp(26px, 3.5vw, 36px); font-weight: 800;
      color: var(--dark); margin-bottom: 12px; letter-spacing: -0.5px;
    }
    .section-header p { font-size: 16px; color: var(--gray-500); max-width: 520px; margin: 0 auto; }

    /* --- FEATURES --- */
    .bg-gray { background: var(--gray-100); }
    .features-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }
    .feature-card {
      background: var(--white); border-radius: var(--radius);
      padding: 32px; border: 1px solid transparent;
      transition: all 0.25s;
    }
    .feature-card:hover {
      border-color: var(--primary-light);
      box-shadow: 0 8px 30px rgba(37,99,235,0.08);
      transform: translateY(-3px);
    }
    .feature-icon {
      width: 48px; height: 48px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; margin-bottom: 16px;
    }
    .fi-blue { background: var(--primary-light); }
    .fi-amber { background: #FEF3C7; }
    .fi-green { background: #D1FAE5; }
    .fi-purple { background: #EDE9FE; }
    .fi-pink { background: #FCE7F3; }
    .fi-teal { background: #CCFBF1; }
    .feature-card h3 { font-size: 17px; font-weight: 700; color: var(--dark); margin-bottom: 8px; }
    .feature-card p { font-size: 14px; color: var(--gray-500); line-height: 1.6; }

    /* --- HOW IT WORKS --- */
    .steps {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 32px; counter-reset: step;
    }
    .step { text-align: center; position: relative; }
    .step::before {
      counter-increment: step; content: counter(step);
      display: flex; align-items: center; justify-content: center;
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--primary); color: var(--white);
      font-size: 20px; font-weight: 700; margin: 0 auto 16px;
    }
    .step h3 { font-size: 16px; font-weight: 700; color: var(--dark); margin-bottom: 8px; }
    .step p { font-size: 14px; color: var(--gray-500); }

    /* --- BENEFITS --- */
    .benefits-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: center;
    }
    .benefits-list { list-style: none; display: flex; flex-direction: column; gap: 20px; }
    .benefits-list li {
      display: flex; gap: 14px; align-items: flex-start;
    }
    .benefit-check {
      flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
      background: #D1FAE5; color: #059669; display: flex;
      align-items: center; justify-content: center; font-size: 14px; font-weight: 700;
      margin-top: 2px;
    }
    .benefit-text h4 { font-size: 15px; font-weight: 700; color: var(--dark); margin-bottom: 2px; }
    .benefit-text p { font-size: 14px; color: var(--gray-500); }
    .benefits-visual {
      background: linear-gradient(135deg, var(--primary), #7C3AED);
      border-radius: var(--radius); padding: 48px 32px;
      color: var(--white); text-align: center;
    }
    .benefits-visual h3 { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
    .benefits-visual p { font-size: 15px; opacity: 0.85; margin-bottom: 32px; }
    .benefit-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .benefit-metric {
      background: rgba(255,255,255,0.15); border-radius: 10px; padding: 20px;
    }
    .benefit-metric .num { font-size: 32px; font-weight: 800; }
    .benefit-metric .label { font-size: 12px; opacity: 0.8; margin-top: 4px; }

    /* --- PRICING --- */
    .pricing-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; }
    .pricing-card {
      background: var(--white); border: 2px solid var(--gray-100);
      border-radius: var(--radius); padding: 36px; position: relative;
      transition: all 0.25s;
    }
    .pricing-card.popular {
      border-color: var(--primary);
      box-shadow: 0 8px 30px rgba(37,99,235,0.12);
    }
    .pricing-badge {
      position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
      background: var(--primary); color: var(--white);
      padding: 4px 16px; border-radius: 12px; font-size: 12px; font-weight: 700;
    }
    .pricing-card h3 { font-size: 18px; font-weight: 700; color: var(--dark); margin-bottom: 4px; }
    .pricing-card .price {
      font-size: 36px; font-weight: 800; color: var(--dark); margin: 16px 0;
    }
    .pricing-card .price span { font-size: 15px; font-weight: 500; color: var(--gray-500); }
    .pricing-card .price-note { font-size: 13px; color: var(--gray-500); margin-bottom: 24px; }
    .pricing-features { list-style: none; display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
    .pricing-features li {
      font-size: 14px; color: var(--gray-700); display: flex; align-items: center; gap: 8px;
    }
    .pricing-features li::before { content: "\2713"; color: var(--primary); font-weight: 700; }
    .pricing-card .btn { width: 100%; justify-content: center; }

    /* --- CONTACT --- */
    .bg-dark { background: var(--dark); color: var(--white); }
    .bg-dark .section-header h2 { color: var(--white); }
    .bg-dark .section-header p { color: var(--gray-500); }
    .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; }
    .contact-info { display: flex; flex-direction: column; gap: 28px; }
    .contact-item { display: flex; gap: 14px; align-items: flex-start; }
    .contact-icon {
      width: 44px; height: 44px; border-radius: 10px;
      background: rgba(37,99,235,0.15); color: var(--primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .contact-item h4 { font-size: 14px; font-weight: 600; color: var(--white); margin-bottom: 2px; }
    .contact-item p { font-size: 14px; color: var(--gray-500); }
    .contact-item a { color: var(--primary-light); text-decoration: none; }
    .contact-item a:hover { text-decoration: underline; }
    .contact-form { display: flex; flex-direction: column; gap: 16px; }
    .contact-form input,
    .contact-form textarea {
      width: 100%; padding: 14px 16px; border-radius: 10px;
      border: 1px solid var(--gray-700); background: var(--gray-900);
      color: var(--white); font-size: 14px; font-family: inherit;
      transition: border-color 0.2s;
    }
    .contact-form input::placeholder,
    .contact-form textarea::placeholder { color: var(--gray-500); }
    .contact-form input:focus,
    .contact-form textarea:focus { outline: none; border-color: var(--primary); }
    .contact-form textarea { resize: vertical; min-height: 120px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* --- FOOTER --- */
    footer {
      background: var(--dark); border-top: 1px solid var(--gray-700);
      padding: 32px 24px; text-align: center;
    }
    footer p { font-size: 13px; color: var(--gray-500); }

    /* --- LOADING --- */
    .loading-overlay {
      position: fixed; inset: 0; background: var(--white);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.3s;
    }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .spinner { width: 40px; height: 40px; border: 4px solid var(--gray-100);
      border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* --- MOBILE --- */
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .nav-links.open {
        display: flex; flex-direction: column; gap: 0;
        position: absolute; top: 64px; left: 0; right: 0;
        background: var(--white); border-bottom: 1px solid var(--gray-100);
        padding: 16px 24px;
      }
      .nav-links.open a { padding: 10px 0; display: block; }
      .menu-toggle { display: block; }
      .hero-stats { gap: 24px; flex-wrap: wrap; }
      .benefits-grid { grid-template-columns: 1fr; }
      .contact-grid { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
</div>

<!-- NAV -->
<nav id="navbar">
  <div class="nav-inner">
    <a href="#" class="logo" id="siteLogo">cellen<span>.</span></a>
    <ul class="nav-links" id="navLinks">
      <li><a href="#funcionalidades">Funcionalidades</a></li>
      <li><a href="#como-funciona">Como Funciona</a></li>
      <li><a href="#beneficios">Benef&#237;cios</a></li>
      <li><a href="#precos">Pre&#231;os</a></li>
      <li><a href="#contacto" class="nav-cta">Contacte-nos</a></li>
    </ul>
    <button class="menu-toggle" onclick="document.getElementById('navLinks').classList.toggle('open')" aria-label="Menu">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
  </div>
</nav>

<!-- Dynamic content rendered here -->
<main id="mainContent">
  <!-- Sections are rendered dynamically by JS, with hardcoded fallback below -->
</main>

<!-- FOOTER -->
<footer>
  <div class="container">
    <p id="footerText">&copy; 2026 Cellen. Todos os direitos reservados.</p>
  </div>
</footer>

<script>
  // --- CONFIG ---
  const API_BASE = window.CELLEN_API || 'https://167.235.158.77.nip.io';
  // --- SECTION RENDERERS ---
  const renderers = {
    hero(c, s) {
      return `
        <section class="hero">
          <div class="container">
            <div class="hero-badge">${c.badge || ''}</div>
            <h1>${c.title || ''}</h1>
            <p class="hero-subtitle">${c.subtitle || ''}</p>
            <div class="hero-buttons">
              ${c.cta_primary ? `<a href="${c.cta_primary.link}" class="btn btn-primary">${c.cta_primary.text}<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></a>` : ''}
              ${c.cta_secondary ? `<a href="${c.cta_secondary.link}" class="btn btn-outline">${c.cta_secondary.text}</a>` : ''}
            </div>
            ${c.stats ? `
              <div class="hero-stats">
                ${c.stats.map(st => `<div class="stat"><div class="stat-num">${st.number}</div><div class="stat-label">${st.label}</div></div>`).join('')}
              </div>
            ` : ''}
          </div>
        </section>`;
    },

    features(c, s) {
      const bg = (s.background === 'gray') ? ' bg-gray' : '';
      return `
        <section id="funcionalidades" class="${bg}">
          <div class="container">
            <div class="section-header">
              <h2>${c.title || ''}</h2>
              <p>${c.subtitle || ''}</p>
            </div>
            <div class="features-grid">
              ${(c.items || []).map(f => `
                <div class="feature-card">
                  <div class="feature-icon fi-${f.color || 'blue'}">${f.icon || ''}</div>
                  <h3>${f.title}</h3>
                  <p>${f.description}</p>
                </div>
              `).join('')}
            </div>
          </div>
        </section>`;
    },

    steps(c) {
      return `
        <section id="como-funciona">
          <div class="container">
            <div class="section-header">
              <h2>${c.title || ''}</h2>
              <p>${c.subtitle || ''}</p>
            </div>
            <div class="steps">
              ${(c.items || []).map(s => `
                <div class="step">
                  <h3>${s.title}</h3>
                  <p>${s.description}</p>
                </div>
              `).join('')}
            </div>
          </div>
        </section>`;
    },

    benefits(c, s) {
      const bg = (s.background === 'gray') ? ' bg-gray' : '';
      return `
        <section id="beneficios" class="${bg}">
          <div class="container">
            <div class="section-header">
              <h2>${c.title || ''}</h2>
              <p>${c.subtitle || ''}</p>
            </div>
            <div class="benefits-grid">
              <ul class="benefits-list">
                ${(c.items || []).map(b => `
                  <li>
                    <div class="benefit-check">\u2713</div>
                    <div class="benefit-text">
                      <h4>${b.title}</h4>
                      <p>${b.description}</p>
                    </div>
                  </li>
                `).join('')}
              </ul>
              <div class="benefits-visual">
                <h3>${c.metrics_title || ''}</h3>
                <p>${c.metrics_subtitle || ''}</p>
                <div class="benefit-metrics">
                  ${(c.metrics || []).map(m => `
                    <div class="benefit-metric">
                      <div class="num">${m.number}</div>
                      <div class="label">${m.label}</div>
                    </div>
                  `).join('')}
                </div>
              </div>
            </div>
          </div>
        </section>`;
    },

    pricing(c) {
      return `
        <section id="precos">
          <div class="container">
            <div class="section-header">
              <h2>${c.title || ''}</h2>
              <p>${c.subtitle || ''}</p>
            </div>
            <div class="pricing-cards">
              ${(c.plans || []).map(p => `
                <div class="pricing-card${p.popular ? ' popular' : ''}">
                  ${p.popular ? '<div class="pricing-badge">Mais popular</div>' : ''}
                  <h3>${p.name}</h3>
                  <p style="font-size:13px;color:var(--gray-500);">${p.description}</p>
                  <div class="price">${p.price}${p.currency ? ` <span>${p.currency}/${p.period}</span>` : ''}</div>
                  <p class="price-note">${p.note}</p>
                  <ul class="pricing-features">
                    ${(p.features || []).map(f => `<li>${f}</li>`).join('')}
                  </ul>
                  <a href="${p.cta?.link || '#contacto'}" class="btn ${p.popular ? 'btn-primary' : 'btn-outline'}">${p.cta?.text || 'Escolher'}</a>
                </div>
              `).join('')}
            </div>
          </div>
        </section>`;
    },

    contact(c, s, settings) {
      const email = settings.contact_email?.value || 'info@cellen.ao';
      const phone = settings.contact_phone?.value || '+244 923 000 000';
      const address = settings.contact_address?.value || 'Luanda, Angola';
      const hours = settings.working_hours?.value || 'Segunda a Sexta, 8h \u2014 17h';
      const bg = (s.background === 'dark') ? ' bg-dark' : '';
      return `
        <section id="contacto" class="${bg}">
          <div class="container">
            <div class="section-header">
              <h2>${c.title || ''}</h2>
              <p>${c.subtitle || ''}</p>
            </div>
            <div class="contact-grid">
              <div class="contact-info">
                <div class="contact-item">
                  <div class="contact-icon">\ud83d\udce7</div>
                  <div><h4>Email</h4><p><a href="mailto:${email}">${email}</a></p></div>
                </div>
                <div class="contact-item">
                  <div class="contact-icon">\ud83d\udcde</div>
                  <div><h4>Telefone / WhatsApp</h4><p><a href="tel:${phone.replace(/\s/g,'')}">${phone}</a></p></div>
                </div>
                <div class="contact-item">
                  <div class="contact-icon">\ud83d\udccd</div>
                  <div><h4>Localiza\u00e7\u00e3o</h4><p>${address}</p></div>
                </div>
                <div class="contact-item">
                  <div class="contact-icon">\ud83d\udd52</div>
                  <div><h4>Hor\u00e1rio de Atendimento</h4><p>${hours}</p></div>
                </div>
              </div>
              <form class="contact-form" id="contactForm" onsubmit="handleSubmit(event)">
                ${(c.form_fields || []).map(f => {
                  if (f.half) return ``;
                  if (f.type === 'textarea') return `<textarea name="${f.name}" placeholder="${f.label}" ${f.required ? 'required' : ''}></textarea>`;
                  return `<input type="${f.type}" name="${f.name}" placeholder="${f.label}" ${f.required ? 'required' : ''}>`;
                }).join('')}
                <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">${c.submit_text || 'Enviar Mensagem'}</button>
              </form>
            </div>
          </div>
        </section>`;
    },
  };

  // Pre-render half-width fields for contact
  const originalContactRenderer = renderers.contact;
  renderers.contact = function(c, s, settings) {
    const fields = c.form_fields || [];
    const halfFields = fields.filter(f => f.half);
    const fullFields = fields.filter(f => !f.half);

    let formHtml = '';
    if (halfFields.length >= 2) {
      formHtml += '<div class="form-row">';
      halfFields.forEach(f => {
        formHtml += `<input type="${f.type}" name="${f.name}" placeholder="${f.label}" ${f.required ? 'required' : ''}>`;
      });
      formHtml += '</div>';
    }
    fullFields.forEach(f => {
      if (f.type === 'textarea') {
        formHtml += `<textarea name="${f.name}" placeholder="${f.label}" ${f.required ? 'required' : ''}></textarea>`;
      } else {
        formHtml += `<input type="${f.type}" name="${f.name}" placeholder="${f.label}" ${f.required ? 'required' : ''}>`;
      }
    });

    const email = settings.contact_email?.value || 'info@cellen.ao';
    const phone = settings.contact_phone?.value || '+244 923 000 000';
    const address = settings.contact_address?.value || 'Luanda, Angola';
    const hours = settings.working_hours?.value || 'Segunda a Sexta, 8h \u2014 17h';
    const bg = (s.background === 'dark') ? ' bg-dark' : '';

    return `
      <section id="contacto" class="${bg}">
        <div class="container">
          <div class="section-header">
            <h2>${c.title || ''}</h2>
            <p>${c.subtitle || ''}</p>
          </div>
          <div class="contact-grid">
            <div class="contact-info">

              </div>
              <div class="contact-item">
                <div class="contact-icon">\ud83d\udcde</div>
                <div><h4>Telefone / WhatsApp</h4><p><a href="tel:${phone.replace(/\s/g,'')}">${phone}</a></p></div>
              </div>
              <div class="contact-item">
                <div class="contact-icon">\ud83d\udccd</div>
                <div><h4>Localiza\u00e7\u00e3o</h4><p>${address}</p></div>
              </div>
              <div class="contact-item">
                <div class="contact-icon">\ud83d\udd52</div>
                <div><h4>Hor\u00e1rio de Atendimento</h4><p>${hours}</p></div>
              </div>
            </div>
            <form class="contact-form" id="contactForm" onsubmit="handleSubmit(event)">
              ${formHtml}
              <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">${c.submit_text || 'Enviar Mensagem'}</button>
            </form>
          </div>
        </div>
      </section>`;
  };

  // --- FALLBACK DATA (used when API is unavailable) ---
  const FALLBACK = {
    settings: {},
    sections: [
      { section_type: 'hero', content: { badge: '\ud83c\udde6\ud83c\uddf4 Feito para escolas em Angola', title: 'Gest\u00e3o escolar <em>simples e completa</em> para a sua institui\u00e7\u00e3o', subtitle: 'Matr\u00edculas, pagamentos, comunica\u00e7\u00e3o com pais, relat\u00f3rios e muito mais \u2014 tudo numa s\u00f3 plataforma.', cta_primary: { text: 'Solicitar Demonstra\u00e7\u00e3o', link: '#contacto' }, cta_secondary: { text: 'Ver Funcionalidades', link: '#funcionalidades' }, stats: [{ number: '12+', label: 'M\u00f3dulos integrados' }, { number: '5', label: 'Perfis de utilizador' }, { number: '100%', label: 'Adaptado a Angola' }] }, settings: {} },
      { section_type: 'features', content: { title: 'Tudo o que a sua escola precisa', subtitle: 'Uma plataforma completa para gerir todos os aspectos do dia-a-dia escolar.', items: [{ icon: '\ud83d\udcda', color: 'blue', title: 'Matr\u00edculas e Inscri\u00e7\u00f5es', description: 'Processo de matr\u00edcula digital com gest\u00e3o de documentos, turmas e dados dos alunos num s\u00f3 lugar.' }, { icon: '\ud83d\udcb0', color: 'amber', title: 'Gest\u00e3o Financeira', description: 'Controlo de mensalidades, gera\u00e7\u00e3o de facturas, registo de pagamentos e relat\u00f3rios financeiros completos.' }, { icon: '\ud83d\udcac', color: 'green', title: 'Comunica\u00e7\u00e3o com Pais', description: 'Mensagens directas, an\u00fancios, caderneta digital e notifica\u00e7\u00f5es autom\u00e1ticas para encarregados de educa\u00e7\u00e3o.' }, { icon: '\ud83d\udccb', color: 'purple', title: 'Assiduidade e Presen\u00e7as', description: 'Registo di\u00e1rio de presen\u00e7as com notifica\u00e7\u00e3o autom\u00e1tica aos pais em caso de falta.' }, { icon: '\ud83c\udfe5', color: 'pink', title: 'Sa\u00fade e Seguran\u00e7a', description: 'Registo de alergias, vacinas, incidentes e autoriza\u00e7\u00f5es de sa\u00edda \u2014 tudo documentado e acess\u00edvel.' }, { icon: '\ud83d\udcca', color: 'teal', title: 'Relat\u00f3rios e Painel', description: 'Dashboard em tempo real com KPIs, estat\u00edsticas de cobran\u00e7a, assiduidade e evolu\u00e7\u00e3o dos alunos.' }] }, settings: { background: 'gray' } },
      { section_type: 'steps', content: { title: 'Como funciona', subtitle: 'Comece a usar o Cellen em poucos passos.', items: [{ title: 'Registe a sua escola', description: 'Preencha os dados da institui\u00e7\u00e3o e receba acesso imediato \u00e0 plataforma.' }, { title: 'Configure turmas e alunos', description: 'Importe ou crie turmas, inscreva alunos e convide educadores e pais.' }, { title: 'Comece a gerir', description: 'Utilize todos os m\u00f3dulos: presen\u00e7as, pagamentos, comunica\u00e7\u00e3o e muito mais.' }, { title: 'Acompanhe resultados', description: 'Analise relat\u00f3rios e tome decis\u00f5es informadas para melhorar a sua escola.' }] }, settings: {} },
      { section_type: 'benefits', content: { title: 'Porqu\u00ea escolher o Cellen?', subtitle: 'Desenhado para a realidade das escolas angolanas.', items: [{ title: 'Multi-moeda (AOA, USD, EUR)', description: 'Factura\u00e7\u00e3o na moeda que a sua escola utiliza, sem complica\u00e7\u00f5es.' }, { title: 'Aplica\u00e7\u00e3o m\u00f3vel para pais', description: 'Os encarregados acompanham tudo pelo telem\u00f3vel \u2014 presen\u00e7as, mensagens, pagamentos.' }, { title: 'Dados seguros e isolados', description: 'Cada escola tem os seus dados completamente separados. Privacidade garantida.' }, { title: 'Sem instala\u00e7\u00e3o de software', description: 'Funciona no navegador e no telem\u00f3vel. Sem necessidade de servidores locais.' }, { title: 'Suporte em portugu\u00eas', description: 'Equipa de suporte que fala a sua l\u00edngua e entende o seu contexto.' }], metrics_title: 'Resultados que importam', metrics_subtitle: 'Escolas que digitalizam a gest\u00e3o ganham efici\u00eancia imediata.', metrics: [{ number: '80%', label: 'Menos tempo administrativo' }, { number: '95%', label: 'Taxa de cobran\u00e7a' }, { number: '3x', label: 'Mais envolvimento dos pais' }, { number: '0', label: 'Pap\u00e9is perdidos' }] }, settings: { background: 'gray' } },
      { section_type: 'pricing', content: { title: 'Planos simples e transparentes', subtitle: 'Escolha o plano ideal para o tamanho da sua escola.', plans: [{ name: 'Essencial', description: 'Para escolas pequenas', price: '25.000', currency: 'AOA', period: 'm\u00eas', note: 'At\u00e9 50 alunos', popular: false, cta: { text: 'Come\u00e7ar', link: '#contacto' }, features: ['Matr\u00edculas e turmas', 'Registo de presen\u00e7as', 'Mensagens aos pais', 'Gest\u00e3o financeira b\u00e1sica', 'Suporte por email'] }, { name: 'Profissional', description: 'Para escolas em crescimento', price: '50.000', currency: 'AOA', period: 'm\u00eas', note: 'At\u00e9 200 alunos', popular: true, cta: { text: 'Escolher', link: '#contacto' }, features: ['Tudo do plano Essencial', 'Relat\u00f3rios avan\u00e7ados', 'Caderneta digital completa', 'Gest\u00e3o de sa\u00fade', 'App m\u00f3vel para pais', 'Suporte priorit\u00e1rio'] }, { name: 'Institucional', description: 'Para grandes institui\u00e7\u00f5es', price: 'Sob consulta', currency: '', period: '', note: 'Alunos ilimitados', popular: false, cta: { text: 'Falar connosco', link: '#contacto' }, features: ['Tudo do plano Profissional', 'M\u00faltiplos campus', 'Website da escola inclu\u00eddo', 'Integra\u00e7\u00f5es personalizadas', 'Gestor de conta dedicado', 'Forma\u00e7\u00e3o presencial'] }] }, settings: {} },
      { section_type: 'contact', content: { title: 'Fale connosco', subtitle: 'Tem d\u00favidas ou quer uma demonstra\u00e7\u00e3o? Estamos \u00e0 disposi\u00e7\u00e3o.', form_fields: [{ name: 'name', label: 'O seu nome', type: 'text', required: true, half: true }, { name: 'school', label: 'Nome da escola', type: 'text', required: false, half: true }, { name: 'email', label: 'Email', type: 'email', required: true, half: false }, { name: 'phone', label: 'Telefone / WhatsApp', type: 'tel', required: false, half: false }, { name: 'message', label: 'A sua mensagem...', type: 'textarea', required: true, half: false }], submit_text: 'Enviar Mensagem' }, settings: { background: 'dark' } },
    ],
  };

  // --- MAIN ---
  async function loadWebsite() {
    let sections, settings = {};

    try {
      if (!API_BASE) throw new Error('No API configured');

      const [settingsRes, pageRes] = await Promise.all([
        fetch(`${API_BASE}/api/v1/website/public/settings`),
        fetch(`${API_BASE}/api/v1/website/public/pages/home`),
      ]);

      if (!settingsRes.ok || !pageRes.ok) throw new Error('API error');

      const settingsArr = await settingsRes.json();
      const pageData = await pageRes.json();

      settings = {};
      settingsArr.forEach(s => { settings[s.key] = s.value; });
      sections = pageData.sections;

      // Apply brand colors
      if (settings.brand_colors) {
        const c = settings.brand_colors;
        const root = document.documentElement.style;
        if (c.primary) root.setProperty('--primary', c.primary);
        if (c.primary_dark) root.setProperty('--primary-dark', c.primary_dark);
        if (c.accent) root.setProperty('--accent', c.accent);
        if (c.dark) root.setProperty('--dark', c.dark);
      }

      // Apply SEO
      if (settings.seo) {
        if (settings.seo.title) document.title = settings.seo.title;
        if (settings.seo.description) {
          document.querySelector('meta[name="description"]').content = settings.seo.description;
        }
      }

      // Apply footer
      if (settings.footer_text?.value) {
        document.getElementById('footerText').textContent = settings.footer_text.value;
      }

    } catch (e) {
      // API unavailable — use fallback
      sections = FALLBACK.sections;
      settings = FALLBACK.settings;
    }

    // Render sections
    const main = document.getElementById('mainContent');
    let html = '';
    sections.forEach(section => {
      const renderer = renderers[section.section_type];
      if (renderer) {
        html += renderer(section.content, section.settings || {}, settings);
      }
    });
    main.innerHTML = html;

    // Hide loader
    document.getElementById('loadingOverlay').classList.add('hidden');
    setTimeout(() => document.getElementById('loadingOverlay').remove(), 300);
  }

  // --- UTILITIES ---
  window.addEventListener('scroll', () => {
    document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 10);
  });

  function handleSubmit(e) {
    e.preventDefault();
    const form = e.target;
    const data = new FormData(form);
    const name = data.get('name');

    // If API is configured, send to backend
    if (API_BASE) {
      fetch(`${API_BASE}/api/v1/website/public/contact`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(Object.fromEntries(data)),
      }).catch(() => {});
    }

    alert('Obrigado ' + name + '! Entraremos em contacto em breve.');
    form.reset();
  }

  document.querySelectorAll('.nav-links a').forEach(a => {
    a.addEventListener('click', () => {
      document.getElementById('navLinks').classList.remove('open');
    });
  });

  // Boot
  loadWebsite();
</script>
